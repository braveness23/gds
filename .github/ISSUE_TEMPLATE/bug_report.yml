name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: |
        1. Install system with...
        2. Run command...
        3. See error...
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware Platform
      description: What hardware are you running on?
      options:
        - Raspberry Pi 3B+
        - Raspberry Pi 4
        - Raspberry Pi 5
        - Linux PC
        - macOS
        - Windows
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "Example: Raspberry Pi OS 64-bit, Ubuntu 22.04, macOS 14.0"
      placeholder: Raspberry Pi OS 64-bit
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: Python 3.11.2
    validations:
      required: true

  - type: textarea
    id: packages
    attributes:
      label: Relevant Package Versions
      description: "Run: `pip list | grep -E 'aubio|numpy|scipy|paho-mqtt'`"
      placeholder: |
        aubio==0.4.9
        numpy==1.24.0
        scipy==1.10.0
        paho-mqtt==1.6.1
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant error messages, stack traces, or log output
      render: shell
      placeholder: |
        Traceback (most recent call last):
          File "main.py", line 123, in <module>
            ...
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant parts of your config.yaml (remove credentials!)
      render: yaml
      placeholder: |
        audio:
          source: "alsa"
          device: "default"
        detection:
          aubio:
            enabled: true
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related issues, etc.)
      placeholder: This started happening after...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have tested with the latest version
          required: true
        - label: I have included all relevant information above
          required: true
