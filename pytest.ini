[pytest]
# Pytest configuration for gunshot detection system

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# Run with: pytest --cov=src --cov-report=html

# Markers for test categorization
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (medium speed, mocked I/O)
    hardware: Hardware tests (slow, requires real hardware)
    slow: Slow running tests
    mqtt: Tests requiring MQTT
    gps: Tests requiring GPS
    sensors: Tests requiring environmental sensors

# Minimum Python version
minversion = 3.7

# Ignore directories
norecursedirs = .git .tox dist build *.egg venv

# Log format
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (prevent hanging)
# timeout = 30

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
